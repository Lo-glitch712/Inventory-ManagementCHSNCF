<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — CHS VITAL System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-header">
    <span class="logo-text">CHS PROJECT VITAL</span>
    <span class="logo-sub">VIRTUAL • INVENTORY • TRACKING • LOGGING</span>
  </div>

  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="subtitle">Register for the CHS VITAL System</p>

    <!-- Role selector -->
    <div class="form-group">
      <label for="roleSelect">Account Type</label>
      <select id="roleSelect" onchange="handleRoleChange(this.value)" required>
        <option value="">— Select your role —</option>
        <option value="Borrower">Borrower (Student)</option>
        <option value="CI Borrower">Clinical Instructor</option>
      </select>
    </div>

    <!-- Email hint: shown conditionally -->
    <div id="emailHintBox" class="hint-box" style="display:none;">
      Use your school email: <strong>yourname@gbox.ncf.edu.ph</strong>
    </div>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input id="name" type="text" placeholder="e.g., Juan dela Cruz" autocomplete="name" required>
    </div>

    <!-- Student-only: ID Number -->
    <div class="form-group" id="fieldIdNumber">
      <label for="idNumber">School ID Number</label>
      <input id="idNumber" type="text" placeholder="e.g., 2024-00123">
      <small style="color:var(--text-muted);font-size:12px;margin-top:4px;display:block;">
        Your school-issued student ID number
      </small>
    </div>

    <div class="form-group">
      <label for="department">Department / Course</label>
      <input id="department" type="text" placeholder="e.g., Nursing, Medicine" required>
    </div>

    <!-- Student-only: Year Level -->
    <div class="form-group" id="fieldYear">
      <label for="year">Year Level</label>
      <input id="year" type="number" placeholder="e.g., 1, 2, 3, 4" min="1" max="6">
    </div>

    <div class="form-group">
      <label for="contact">Contact Number</label>
      <input id="contact" type="tel" placeholder="e.g., 09XX-XXX-XXXX" required>
    </div>

    <div class="form-group">
      <label for="email" id="emailLabel">School Email</label>
      <input id="email" type="email" placeholder="yourname@gbox.ncf.edu.ph" autocomplete="email" required>
      <small id="emailHint" style="color:var(--text-muted);font-size:12px;margin-top:4px;display:block;">
        Must end with @gbox.ncf.edu.ph
      </small>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Minimum 8 characters" minlength="8" autocomplete="new-password" required>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" placeholder="Re-enter your password" minlength="8" autocomplete="new-password" required>
    </div>

    <button onclick="register(this)" style="margin-top: 14px;">Create Account</button>

    <div class="auth-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function handleRoleChange(role) {
      const isCI = role === 'CI Borrower';
      const isStudent = role === 'Borrower';

      // ID Number field: hidden for CI
      document.getElementById('fieldIdNumber').style.display = isCI ? 'none' : '';
      const idInput = document.getElementById('idNumber');
      idInput.required = isStudent;
      if (isCI) idInput.value = '';

      // Year Level field: hidden for CI
      document.getElementById('fieldYear').style.display = isCI ? 'none' : '';
      const yearInput = document.getElementById('year');
      yearInput.required = isStudent;
      if (isCI) yearInput.value = '';

      // Email: hint + validation changes
      const emailInput = document.getElementById('email');
      const emailHint = document.getElementById('emailHint');
      const emailHintBox = document.getElementById('emailHintBox');
      const emailLabel = document.getElementById('emailLabel');

      if (isCI) {
        emailLabel.textContent = 'Email Address';
        emailInput.placeholder = 'e.g., yourname@gmail.com';
        emailHint.textContent = 'Any valid email address accepted';
        emailHintBox.style.display = 'none';
      } else if (isStudent) {
        emailLabel.textContent = 'School Email';
        emailInput.placeholder = 'yourname@gbox.ncf.edu.ph';
        emailHint.textContent = 'Must end with @gbox.ncf.edu.ph';
        emailHintBox.style.display = '';
      } else {
        emailLabel.textContent = 'Email Address';
        emailInput.placeholder = 'you@example.com';
        emailHint.textContent = '';
        emailHintBox.style.display = 'none';
      }
    }

    // Init: hide conditional fields until role is chosen
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('fieldIdNumber').style.display = 'none';
      document.getElementById('fieldYear').style.display = 'none';
      document.getElementById('emailHintBox').style.display = 'none';
      document.getElementById('emailHint').textContent = '';
    });
  </script>
</body>
</html>
