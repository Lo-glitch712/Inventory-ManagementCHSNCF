<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Register — CHS VITAL System</title>
 <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

 <div class="auth-header">
 <span class="logo-text">CHS PROJECT VITAL</span>
 <span class="logo-sub">VIRTUAL • INVENTORY • TRACKING • LOGGING</span>
 </div>

 <div class="auth-card">
 <h2>Create Account</h2>
 <p class="subtitle">Student borrower registration</p>

 <div class="hint-box">
 Use your school email: <strong><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="522b3d27203c333f371235303d2a7c3c31347c3736277c223a">[email&#160;protected]</a></strong>
 </div>

 <div class="form-group">
 <label for="name">Full Name</label>
 <input id="name" type="text" placeholder="e.g., Juan dela Cruz" autocomplete="name" required>
 </div>

 <div class="form-group">
 <label for="idNumber">School ID Number</label>
 <input id="idNumber" type="text" placeholder="e.g., 2024-00123" required>
 <small style="color:var(--text-muted);font-size:12px;margin-top:4px;display:block;">
 Your school-issued student ID number
 </small>
 </div>

 <div class="form-group">
 <label for="department">Department / Course</label>
 <input id="department" type="text" placeholder="e.g., Nursing, Medicine" required>
 </div>

 <div class="form-group">
 <label for="year">Year Level</label>
 <input id="year" type="number" placeholder="e.g., 1, 2, 3, 4" min="1" max="6" required>
 </div>

 <div class="form-group">
 <label for="contact">Contact Number</label>
 <input id="contact" type="tel" placeholder="e.g., 09XX-XXX-XXXX" required>
 </div>

 <div class="form-group">
 <label for="email">School Email</label>
 <input id="email" type="email" placeholder="yourname@gbox.ncf.edu.ph" autocomplete="email" required>
 <small style="color:var(--text-muted);font-size:12px;margin-top:4px;display:block;">
 Must end with @gbox.ncf.edu.ph
 </small>
 </div>

 <div class="form-group">
 <label for="password">Password</label>
 <input id="password" type="password" placeholder="Minimum 8 characters" minlength="8" autocomplete="new-password" required>
 </div>

 <div class="form-group">
 <label for="confirmPassword">Confirm Password</label>
 <input id="confirmPassword" type="password" placeholder="Re-enter your password" minlength="8" autocomplete="new-password" required>
 </div>

 <button onclick="register()" style="margin-top: 14px;">Create Account</button>

 <div class="auth-link">
