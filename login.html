<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Login — CHS VITAL System</title>
 <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

 <div class="auth-header">
 <span class="logo-text">CHS PROJECT VITAL</span>
 <span class="logo-sub">VIRTUAL • INVENTORY • TRACKING • LOGGING</span>
 </div>

 <div class="auth-card">
 <h2>Welcome back</h2>
 <p class="subtitle">Sign in to your account to continue</p>

 <div class="form-group">
 <label for="email">Email Address</label>
 <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
 </div>

 <div class="form-group">
 <label for="password">Password</label>
 <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
 </div>

 <button onclick="login(this)" style="margin-top: 14px;">Sign In</button>

 <div class="auth-link">
 Don't have an account? <a href="register.html">Create one</a>
 </div>
 </div>

<script src="app.js"></script>
</body>
</html>
